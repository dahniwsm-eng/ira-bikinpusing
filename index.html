<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Maniez</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #120b14;
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }
  .section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 40px 20px;
    text-align: center;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    max-width: 500px;
    width: 100%;
    margin: 20px 0;
  }
  .photo-grid img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    border-radius: 12px;
    filter: grayscale(100%);
  }
  .photo-grid p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    margin-top: 8px;
    color: #ddd;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 400;
    margin: 10px 0;
  }
  h1 .italic {
    font-style: italic;
    color: #f8b4d9;
  }
  .subtitle {
    font-size: 14px;
    color: #aaa;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .message {
    max-width: 600px;
    font-size: 15px;
    line-height: 1.8;
    color: #ccc;
    padding: 0 20px;
  }
  .flowers {
    font-size: 24px;
    margin: 20px 0;
  }
  .heart {
    font-size: 28px;
    margin: 20px 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .petal {
    position: fixed;
    width: 8px;
    height: 8px;
    background: rgba(248, 180, 217, 0.4);
    border-radius: 50% 0 50% 50%;
    pointer-events: none;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
  .music-player {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(20, 15, 25, 0.8);
    backdrop-filter: blur(10px);
    padding: 12px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .music-player img {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    object-fit: cover;
  }
  .music-info {
    font-size: 12px;
  }
  .music-info .title {
    font-weight: 500;
    color: #fff;
  }
  .music-info .artist {
    color: #aaa;
    font-size: 11px;
  }
  .play-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #f8b4d9;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<div class="section">
  <div class="photo-grid">
    <div>
      <img src="attachment://36419372734320402" alt="photo1">
      <p>you</p>
    </div>
    <div>
      <img src="attachment://36419372727653736" alt="photo2">
      <p>are</p>
    </div>
    <div>
      <img src="attachment://36419372724320403" alt="photo3">
      <p>my</p>
    </div>
    <div>
      <img src="attachment://36419372717653737" alt="photo4">
      <p>bestie</p>
    </div>
  </div>
</div>

<div class="section">
  <div class="flowers">🌸🌺🌹🌸🌷</div>
  <p class="subtitle">for my best friend</p>
  <h1>Hey Maniez</h1>
  <h1 class="italic">ira oktavia ingusan ga berenti berenti</h1>
  
  <p class="message">
    udahin skyzo nya aku agak perihatin liat nya lama awokawok
  </p>
  
  <div class="heart">💖</div>
  <p class="subtitle">Made with love, just for you Maniez 🌸</p>
</div>

<div class="music-player">
  <img src="attachment://36419372734320402" alt="cover">
  <div class="music-info">
    <div class="title">Call Me Anything You Want</div>
    <div class="artist">Your Song</div>
  </div>
  <button class="play-btn" onclick="toggleMusic()">▶</button>
</div>

<audio id="bg-music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function toggleMusic() {
  const music = document.getElementById('bg-music');
  const btn = document.querySelector('.play-btn');
  if (music.paused) {
    music.play();
    btn.innerHTML = '⏸';
  } else {
    music.pause();
    btn.innerHTML = '▶';
  }
}
function createPetal() {
  const petal = document.createElement('div');
  petal.classList.add('petal');
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.animationDuration = Math.random() * 5 + 5 + 's';
  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 10000);
}
setInterval(createPetal, 400);
</script>

</body>
</html>
